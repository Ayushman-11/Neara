name: neara
description: AI-driven hyperlocal service & emergency response platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.4
  flutter_dotenv: ^5.1.0
  http: ^1.2.1
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
